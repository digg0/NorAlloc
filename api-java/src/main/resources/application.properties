# Diz ao Java onde o banco de dados está (o host é 'database', nome do container no Docker)
spring.datasource.url=jdbc:postgresql://database:5432/gestao_horarios

# Senhas (as mesmas que você colocou no .env)
spring.datasource.username=admin
spring.datasource.password=senha123

# Configurações do Hibernate para criar tabelas automaticamente no futuro
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta do Spring Boot
server.port=8080