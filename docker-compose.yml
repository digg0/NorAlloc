version: '3.8'

services:
  # 🗄️ Banco de Dados (PostgreSQL)
  database:
    image: postgres:15-alpine
    container_name: gestao_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gestao_network

  # 🐍 Backend (FastAPI)
  backend:
    build: ./backend-python
    container_name: gestao_python_api
    restart: always
    volumes:
      - ./backend-python:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    depends_on:
      - database
    networks:
      - gestao_network

  # ⚛️ Frontend (React com Vite)
  frontend:
    build: ./frontend-react
    container_name: gestao_frontend
    restart: always
    volumes:
      - ./frontend-react:/app
      - /app/node_modules # Protege a pasta de conflitos com o PC local
    ports:
      - "5173:5173"
    stdin_open: true 
    tty: true
    networks:
      - gestao_network

# 💾 Volumes persistentes
volumes:
  pgdata:

# 🌐 Redes isoladas do projeto
networks:
  gestao_network:
    driver: bridge