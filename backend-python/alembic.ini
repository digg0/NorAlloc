# Configuração do Alembic (migrations de schema).
# A URL do banco é definida em alembic/env.py a partir de DATABASE_URL.

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url é resolvida em env.py (lê DATABASE_URL do ambiente)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
