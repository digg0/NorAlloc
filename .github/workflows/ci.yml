name: CI Inteligente do Projeto

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validar-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Instalar Python e Validar (Automático)
        run: |
          cd backend-python
          if [ -f "requirements.txt" ]; then
            echo "🐍 requirements.txt encontrado! Instalando dependências do FastAPI..."
            pip install -r requirements.txt
            # No futuro, você pode colocar um comando de teste aqui, como: pytest
          else
            echo "⏳ Nenhum requirements.txt ainda. Ignorando instalação."
          fi

  validar-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Instalar Frontend (Automático)
        run: |
          cd frontend-react
          if [ -f "package.json" ]; then
            echo "📦 package.json encontrado! Instalando dependências do React..."
            npm install
            # No futuro, pode adicionar: npm run build
          else
            echo "⏳ Nenhum package.json ainda. Ignorando instalação por enquanto."
          fi